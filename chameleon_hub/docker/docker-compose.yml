version: "3.9"

services:
  chameleon_hub:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: chameleon_hub
    ports:
      - "8080:8080"
    environment:
      - CHAMELEON_ENV=production
      - LEDGER_MODE=iota_private
      - SAFETY_LEVEL=strict
      - LOG_LEVEL=INFO
    volumes:
      - ../logs:/app/logs
      - ../config:/app/config
    restart: unless-stopped
    networks:
      - chameleon_net

  chameleon_redis:
    image: redis:7-alpine
    container_name: chameleon_redis
    ports:
      - "6379:6379"
    networks:
      - chameleon_net

  chameleon_influxdb:
    image: influxdb:2.7
    container_name: chameleon_influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=chameleon
      - DOCKER_INFLUXDB_INIT_PASSWORD=chameleon_secure_pass
      - DOCKER_INFLUXDB_INIT_ORG=chameleon_org
      - DOCKER_INFLUXDB_INIT_BUCKET=device_telemetry
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - chameleon_net

networks:
  chameleon_net:
    driver: bridge

volumes:
  influxdb_data:
